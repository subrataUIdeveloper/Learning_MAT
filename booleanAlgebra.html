<!--=======================================================================
        semantic tags Tags that describe meaning of content. 
        ex:- <header>, <footer>, <article>, <section>, <nav>

CRP = process of converting HTML → DOM + CSS → CSSOM → Render Tree → Paint

                    CRP Optimization:

                    Minimize render-blocking CSS
                    Use defer for JS
                    Inline critical CSS
                    Lazy load images
=========================================================================-->
<!DOCTYPE html>
