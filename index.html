<script>

//    ¬ ( A ∧ B ) = ( ¬A ) ∨ ( ¬B )  
// not ( A and B) = (notA) or (notB)

// ¬ ( A ∨ B ) = ( ¬A ) ∧ ( ¬B )  
// not ( A or B) = (not A) and (not B)

const is_admin = true; 
const is_logged_in = false;
let text;
let result = !(is_admin && is_logged_in);
document.getElementById("logicalOperators").innerHTML += 
"Result of !(is_admin && is_logged_in) is: " + result;



switch (new Date().getDay()) {
  case 6:
    text = "Today is Saturday";
    break;
  case 0:
    text = "Today is Sunday";
   default:
    text = new Date().toString()
    + "</br> " + 
    new Date().toString().replace(/.{3}/, "")
    + " " + 
    new Date().toString().slice(4, 7) 
    + " " + 
    new Date().toString().slice(8, 10);

   	// alert(result);
}


document.getElementById("date").innerHTML = text;

/// TOURNARY OPERATOR
const toggleImage = () => {
    const image = document.getElementById("myImage");
    image.src === "https://www.w3schools.com/js/pic_bulboff.gif"
    ? image.src = "https://www.w3schools.com/js/pic_bulbon.gif" 
    : image.src = "https://www.w3schools.com/js/pic_bulboff.gif";    
};

const cars = ["BMW", "Volvo", "Saab", "Ford"];

let arr = " ";


//<!===============================LOOPS==============================!>

//simple
for(let i = 0; i < cars.length; i++){
    arr += cars[i] + " ";
}

// type 2
for(let i in cars){
    arr +=  "</br>" + i + " : " + cars[i];
}


let i = 0;
do{
    arr += "<br>" + cars[i];
    i++;
}
while(i < cars.length);

document.getElementById("demo").innerHTML = arr;


/*===============================TEMPLATE STRINGS===============================*/

let header = "Template Strings";
let tags = ["template strings", "javascript", "es6"];




let loop = "";

for(let i = 0; i < tags.length; i++){
           loop += `<li>` + tags[i] + `</li>`;
        } 

//map method is used to iterate over the array and create a list item for each tag
let html = `
    <h2>${header}</h2>
    <ul> 
        ${tags.map(tag => `<li>${tag}</li>`).join("")}
    </ul>
`;
document.getElementById("loop").innerHTML += loop;
document.getElementById("template_string").innerHTML += html;


let numbers = [-1, 2, 3, -9];

function maxNumberSum(numbers){
    let maxSum = 0;
    for(let i = 0; i < numbers.length; i++){
        let currentSum = 0;
        for(let j = i; j < numbers.length; j++){
            currentSum += numbers[j];
            maxSum = Math.max(maxSum, currentSum);
        }
    }
    return maxSum;
}

let maxSum = maxNumberSum(numbers);
document.getElementById("maxSum").innerHTML += "<br>Maximum sum of contiguous subarray: " + maxSum;
